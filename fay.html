<title>Fay's Balance Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>

<style>
/* === CSS_SECTION: Variables and Reset === */
:root {
  --bg: #EEF1F8;
  --card: #FFFFFF;
  --indigo: #667eea;
  --indigo-dark: #5568d3;
  --purple: #764ba2;
  --gold: #E8A838;
  --gold-light: #FFF3DC;
  --coral: #EF6B6B;
  --blue: #5B8DEF;
  --teal: #2D9F7F;
  --text: #1E1E2E;
  --text-light: #7A7E9A;
  --border: #D6DAE8;
  --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --gradient-gold: linear-gradient(135deg, #E8A838 0%, #F4C76B 100%);
  --gradient-coral: linear-gradient(135deg, #EF6B6B 0%, #F09090 100%);
  --gradient-blue: linear-gradient(135deg, #5B8DEF 0%, #82AEFC 100%);
  --gradient-teal: linear-gradient(135deg, #2D9F7F 0%, #45C4A0 100%);
  --shadow: 0 4px 20px rgba(102,126,234,0.10);
  --shadow2: 0 8px 32px rgba(102,126,234,0.18);
  --radius: 20px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: -100px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(102,126,234,0.10) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; bottom: -80px; left: -40px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(118,75,162,0.08) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; }

/* === CSS_SECTION: Layout === */
.header {
  text-align: center; padding: 40px 20px 24px;
}
.header-emoji { font-size: 2.6rem; margin-bottom: 6px; }
.header h1 {
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.6rem;
  background: var(--gradient-main);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header p { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }
.container { max-width: 720px; margin: 0 auto; padding: 0 16px 110px; }

/* === CSS_SECTION: Hero Card === */
.balance-hero {
  background: var(--gradient-main); border-radius: var(--radius);
  padding: 28px 24px; text-align: center; color: #fff;
  margin-bottom: 16px; box-shadow: var(--shadow2);
  position: relative; overflow: hidden;
}
.balance-hero::after {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: rgba(255,255,255,0.1); border-radius: 50%;
}
.balance-hero::before {
  content: ''; position: absolute; bottom: -20px; left: -20px;
  width: 70px; height: 70px;
  background: rgba(255,255,255,0.08); border-radius: 50%;
}
.balance-hero .bl { font-size: 0.75rem; opacity: 0.85; margin-bottom: 4px; }
.balance-hero .bv {
  font-family: 'Quicksand', sans-serif; font-size: 2.4rem; font-weight: 700;
}
.balance-hero .bu { font-size: 0.7rem; opacity: 0.7; margin-top: 2px; }
.balance-hero .bchange {
  display: inline-block; margin-top: 8px; padding: 3px 12px;
  border-radius: 12px; font-size: 0.72rem; font-weight: 600;
  background: rgba(255,255,255,0.2);
}

/* === CSS_SECTION: Summary Row === */
.summary-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;
}
.summary-card {
  border-radius: var(--radius); padding: 18px 14px;
  text-align: center; color: #fff;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow); transition: transform 0.3s;
}
.summary-card:active { transform: scale(0.96); }
.summary-card::after {
  content: ''; position: absolute; top: -15px; right: -15px;
  width: 50px; height: 50px;
  background: rgba(255,255,255,0.15); border-radius: 50%;
}
.summary-card.bank { background: var(--gradient-blue); }
.summary-card.stock { background: var(--gradient-gold); }
.summary-card.credit { background: var(--gradient-coral); }
.summary-card .sc-emoji { font-size: 1.3rem; margin-bottom: 4px; }
.summary-card .sc-label { font-size: 0.6rem; opacity: 0.9; }
.summary-card .sc-value { font-family: 'Quicksand', sans-serif; font-size: 1.2rem; font-weight: 700; }

/* === CSS_SECTION: Chart Section === */
.chart-section {
  background: var(--card); border-radius: var(--radius);
  padding: 22px 16px; margin-bottom: 20px;
  box-shadow: var(--shadow); border: 2px solid rgba(102,126,234,0.06);
}
.chart-section h2 {
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.95rem;
  color: var(--text); margin-bottom: 14px; text-align: center;
}
.chart-tabs {
  display: flex; justify-content: center; gap: 6px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.chart-tab {
  padding: 5px 14px; border-radius: 18px;
  border: 2px solid var(--border); background: #FAFAFA;
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.7rem;
  color: var(--text-light); cursor: pointer;
  transition: all 0.3s; font-weight: 500;
}
.chart-tab.active {
  background: var(--gradient-main); color: #fff;
  border-color: transparent; box-shadow: 0 3px 12px rgba(102,126,234,0.25);
}
.chart-container { position: relative; height: 220px; }

/* === CSS_SECTION: Record Cards === */
.section-header {
  text-align: center; margin-bottom: 14px;
  font-family: 'Quicksand', sans-serif; font-weight: 700;
  font-size: 0.95rem; color: var(--text);
}
.record-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 2px solid transparent;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.record-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: 20px 20px 0 0;
}
.record-card.pos::before { background: var(--gradient-main); }
.record-card.neg::before { background: var(--gradient-coral); }
.record-card:active { transform: scale(0.98); }
.record-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.record-date {
  font-family: 'Quicksand', sans-serif; font-size: 0.8rem;
  font-weight: 600; color: var(--indigo);
}
.record-balance {
  font-family: 'Quicksand', sans-serif; font-size: 0.78rem;
  font-weight: 700; padding: 3px 10px; border-radius: 10px;
  background: rgba(102,126,234,0.08); color: var(--indigo);
}
.record-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.record-item {
  background: #F3F4FA; border-radius: 12px;
  padding: 8px; text-align: center;
}
.record-item.bank-item { background: #EEF3FF; }
.record-item.stock-item { background: var(--gold-light); }
.record-item.credit-item { background: #FFF0F0; }
.record-item.change-item { background: #F0FAF5; }
.record-item .rl { font-size: 0.55rem; color: var(--text-light); font-weight: 500; }
.record-item .rv {
  font-family: 'Quicksand', sans-serif; font-size: 0.9rem;
  font-weight: 700; margin-top: 1px; color: var(--text);
}
.record-item.bank-item .rv { color: var(--blue); }
.record-item.stock-item .rv { color: var(--gold); }
.record-item.credit-item .rv { color: var(--coral); }
.record-item.change-item .rv.up { color: var(--teal); }
.record-item.change-item .rv.down { color: var(--coral); }
.record-detail-toggle {
  text-align: center; margin-top: 10px;
}
.record-detail-toggle button {
  background: none; border: none; color: var(--text-light);
  font-size: 0.68rem; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
}
.record-detail {
  display: none; margin-top: 10px;
  grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.record-detail.open { display: grid; }
.record-detail .rd-item {
  background: #F7F8FC; border-radius: 10px;
  padding: 6px; text-align: center;
}
.record-detail .rd-label { font-size: 0.5rem; color: var(--text-light); }
.record-detail .rd-val {
  font-family: 'Quicksand', sans-serif; font-size: 0.78rem;
  font-weight: 600; color: var(--text);
}
.record-actions {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px;
}
.record-actions button {
  background: none; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 4px 12px; font-size: 0.65rem;
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-light); transition: all 0.2s;
}
.record-actions button:hover { border-color: var(--indigo); color: var(--indigo); }
.record-actions button.del:hover { border-color: var(--coral); color: var(--coral); }

/* === CSS_SECTION: FAB and Modal === */
.fab {
  position: fixed; bottom: 30px; right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--gradient-main); color: #fff;
  border: none; font-size: 1.8rem; cursor: pointer;
  box-shadow: 0 6px 24px rgba(102,126,234,0.35);
  z-index: 100; transition: transform 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.9); }
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,30,46,0.5); z-index: 200;
  backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 28px 20px 36px; width: 100%; max-width: 520px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.35s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal h2 {
  font-family: 'Quicksand', sans-serif; font-weight: 700;
  font-size: 1.1rem; text-align: center; margin-bottom: 18px;
  background: var(--gradient-main);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.form-group {
  margin-bottom: 12px;
}
.form-group label {
  display: block; font-size: 0.7rem; color: var(--text-light);
  margin-bottom: 4px; font-weight: 500;
}
.form-group input {
  width: 100%; padding: 10px 14px; border-radius: 12px;
  border: 2px solid var(--border); font-size: 0.85rem;
  font-family: 'Quicksand', sans-serif;
  transition: border-color 0.3s; outline: none;
  background: #F7F8FC;
}
.form-group input:focus { border-color: var(--indigo); background: #fff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-section-title {
  font-size: 0.72rem; font-weight: 700; color: var(--indigo);
  margin: 14px 0 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.modal-btns {
  display: flex; gap: 10px; margin-top: 18px;
}
.modal-btns button {
  flex: 1; padding: 12px; border-radius: 14px;
  border: none; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
}
.modal-btns .btn-cancel {
  background: #F3F4FA; color: var(--text-light);
}
.modal-btns .btn-save {
  background: var(--gradient-main); color: #fff;
  box-shadow: 0 4px 16px rgba(102,126,234,0.3);
}
.modal-btns .btn-save:active { transform: scale(0.96); }

/* === CSS_SECTION: Toolbar === */
.toolbar {
  display: flex; justify-content: center; gap: 10px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 14px;
  border: 2px solid var(--border); background: var(--card);
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.72rem;
  color: var(--indigo); cursor: pointer; font-weight: 600;
  transition: all 0.3s; box-shadow: var(--shadow);
}
.toolbar-btn:hover { border-color: var(--indigo); background: #F3F4FA; }
.toolbar-btn:active { transform: scale(0.95); }
.toolbar-btn.export-btn { color: var(--teal); }
.toolbar-btn.export-btn:hover { border-color: var(--teal); }

@media(min-width:500px){
  .summary-row { grid-template-columns: 1fr 1fr 1fr; }
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-emoji">💎</div>
    <h1>Fay's Balance Sheet</h1>
    <p>个人资产追踪 · 财富增长可视化</p>
  </div>
  <div class="container" id="main-container">
    <!-- Content rendered by JS -->
  </div>
  <!-- FAB Button -->
  <button class="fab" onclick="openModal()">+</button>
  <!-- Hidden file input for import -->
  <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(event)">
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">添加记录</h2>
    <input type="hidden" id="editIdx" value="-1">
    <div class="form-group">
      <label>日期 (YYYY-MM)</label>
      <input type="text" id="f_date" placeholder="2024-11">
    </div>
    <div class="form-section-title">🏦 银行账户</div>
    <div class="form-row">
      <div class="form-group"><label>招商银行</label><input type="number" step="0.01" id="f_cmb" placeholder="0"></div>
      <div class="form-group"><label>招商理财</label><input type="number" step="0.01" id="f_cmbFps" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>招商基金</label><input type="number" step="0.01" id="f_cmbFund" placeholder="0"></div>
      <div class="form-group"><label>中国银行</label><input type="number" step="0.01" id="f_boc" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>深圳农商行</label><input type="number" step="0.01" id="f_szRcb" placeholder="0"></div>
      <div class="form-group"><label>农业银行</label><input type="number" step="0.01" id="f_abc" placeholder="0"></div>
    </div>
    <div class="form-group"><label>华富</label><input type="number" step="0.01" id="f_hf" placeholder="0"></div>
    <div class="form-section-title">📈 股票账户</div>
    <div class="form-row">
      <div class="form-group"><label>广发股票</label><input type="number" step="0.01" id="f_gxStock" placeholder="0"></div>
      <div class="form-group"><label>广发基金</label><input type="number" step="0.01" id="f_gxFund" placeholder="0"></div>
    </div>
    <div class="form-group"><label>有效股票</label><input type="number" step="0.01" id="f_validStock" placeholder="0"></div>
    <div class="form-section-title">💳 信用卡</div>
    <div class="form-row">
      <div class="form-group"><label>招商信用卡</label><input type="number" step="0.01" id="f_cmbCredit" placeholder="0"></div>
      <div class="form-group"><label>农行信用卡</label><input type="number" step="0.01" id="f_abcCredit" placeholder="0"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

// === JS_SECTION: Utility Functions ===
function fmt(n){
  if(n==null||n===0) return '-';
  var abs = Math.abs(n);
  if(abs>=10000) return (n<0?'-':'') + (abs/10000).toFixed(abs%10000===0?0:1) + 'w';
  return n.toLocaleString();
}
function fmtFull(n){
  if(n==null||n===0) return '-';
  return n.toLocaleString('zh-CN', {maximumFractionDigits:2});
}

// === JS_SECTION: Chart Logic ===
var myChart = null;
var currentTab = 'grand';

function renderChart(data){
  var canvas = document.getElementById('mainChart');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var sorted = data.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var labels = sorted.map(function(r){ return r.date; });
  var datasets = [];

  if(currentTab === 'grand'){
    datasets = [{
      label: '总资产', data: sorted.map(function(r){ return r.grandTotal; }),
      borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.10)',
      fill: true, tension: 0.4, pointRadius: 3, borderWidth: 2
    }];
  } else if(currentTab === 'bank'){
    datasets = [
      { label: '招商银行', data: sorted.map(function(r){ return r.cmb||0; }), borderColor: '#5B8DEF', tension: 0.4, pointRadius: 2, borderWidth: 1.5, fill: false },
      { label: '招商理财', data: sorted.map(function(r){ return r.cmbFps||0; }), borderColor: '#764ba2', tension: 0.4, pointRadius: 2, borderWidth: 1.5, fill: false },
      { label: '银行合计', data: sorted.map(function(r){ return r.bankTotal||0; }), borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.06)', tension: 0.4, pointRadius: 3, borderWidth: 2, fill: true }
    ];
  } else if(currentTab === 'stock'){
    datasets = [
      { label: '广发股票', data: sorted.map(function(r){ return r.gxStock||0; }), borderColor: '#E8A838', tension: 0.4, pointRadius: 2, borderWidth: 1.5, fill: false },
      { label: '有效股票', data: sorted.map(function(r){ return r.validStock||0; }), borderColor: '#F4C76B', tension: 0.4, pointRadius: 2, borderWidth: 1.5, fill: false },
      { label: '股票合计', data: sorted.map(function(r){ return r.stockTotal||0; }), borderColor: '#d4940a', backgroundColor: 'rgba(232,168,56,0.08)', tension: 0.4, pointRadius: 3, borderWidth: 2, fill: true }
    ];
  } else if(currentTab === 'credit'){
    datasets = [{
      label: '信用卡合计', data: sorted.map(function(r){ return r.creditTotal||0; }),
      borderColor: '#EF6B6B', backgroundColor: 'rgba(239,107,107,0.10)',
      fill: true, tension: 0.4, pointRadius: 3, borderWidth: 2
    }];
  }

  if(myChart){ myChart.destroy(); }
  myChart = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: datasets.length > 1, labels: { font: { size: 10, family: 'Noto Sans SC' }, boxWidth: 12 } },
        tooltip: {
          callbacks: { label: function(ctx){ return ctx.dataset.label + ': ' + fmtFull(ctx.parsed.y); } }
        }
      },
      scales: {
        x: { ticks: { font: { size: 9 }, maxRotation: 45 }, grid: { display: false } },
        y: { ticks: { font: { size: 9 }, callback: function(v){ return fmt(v); } }, grid: { color: 'rgba(0,0,0,0.04)' } }
      }
    }
  });
}

function deleteRecord(idx){
  if(!confirm('确定删除此记录？')) return;
  var data = getData();
  data.splice(idx, 1);
  // Recalculate changes
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  for(var i=0; i<data.length; i++){
    data[i].change = i > 0 ? data[i].grandTotal - data[i-1].grandTotal : 0;
  }
  saveData(data);
  render();
}

function saveRecord(){
  var dateVal = document.getElementById('f_date').value.trim();
  if(!dateVal || !/^\d{4}-\d{2}$/.test(dateVal)){
    alert('请输入正确的日期格式 (YYYY-MM)');
    return;
  }

  var cmb = parseFloat(document.getElementById('f_cmb').value) || 0;
  var cmbFps = parseFloat(document.getElementById('f_cmbFps').value) || 0;
  var cmbFund = parseFloat(document.getElementById('f_cmbFund').value) || 0;
  var boc = parseFloat(document.getElementById('f_boc').value) || 0;
  var szRcb = parseFloat(document.getElementById('f_szRcb').value) || 0;
  var abc = parseFloat(document.getElementById('f_abc').value) || 0;
  var hf = parseFloat(document.getElementById('f_hf').value) || 0;
  var gxStock = parseFloat(document.getElementById('f_gxStock').value) || 0;
  var gxFund = parseFloat(document.getElementById('f_gxFund').value) || 0;
  var validStock = parseFloat(document.getElementById('f_validStock').value) || 0;
  var cmbCredit = parseFloat(document.getElementById('f_cmbCredit').value) || 0;
  var abcCredit = parseFloat(document.getElementById('f_abcCredit').value) || 0;

  var bankTotal = cmb + cmbFps + cmbFund + boc + szRcb + abc + hf;
  var stockTotal = gxStock + gxFund + validStock;
  var creditTotal = -(Math.abs(cmbCredit) + Math.abs(abcCredit));
  var grandTotal = bankTotal + stockTotal + creditTotal;

  var record = {
    date: dateVal, cmb: cmb, cmbFps: cmbFps, cmbFund: cmbFund,
    boc: boc, szRcb: szRcb, abc: abc, hf: hf,
    bankTotal: bankTotal, gxStock: gxStock, gxFund: gxFund,
    validStock: validStock, stockTotal: stockTotal,
    cmbCredit: cmbCredit, abcCredit: abcCredit,
    creditTotal: creditTotal, grandTotal: grandTotal, change: 0
  };

  var data = getData();
  var editIdx = parseInt(document.getElementById('editIdx').value);
  if(editIdx >= 0){
    data[editIdx] = record;
  } else {
    data.push(record);
  }

  // Sort and recalculate all changes
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  for(var i=0; i<data.length; i++){
    data[i].change = i > 0 ? data[i].grandTotal - data[i-1].grandTotal : 0;
  }

  saveData(data);
  closeModal();
  render();
}

// === JS_SECTION: Import & Export ===
function handleImport(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:0});
      // Find header row (row with 'Date' in it)
      var headerIdx = -1;
      for(var i=0; i<Math.min(rows.length,5); i++){
        var row = rows[i];
        for(var j=0; j<row.length; j++){
          if(row[j] && String(row[j]).toLowerCase().indexOf('date') >= 0){
            headerIdx = i; break;
          }
        }
        if(headerIdx >= 0) break;
      }
      if(headerIdx < 0){ alert('无法识别表头，请确保第一行或第二行包含 Date 列'); return; }
      var imported = [];
      for(var r=headerIdx+1; r<rows.length; r++){
        var row = rows[r];
        var dateVal = row[1];
        if(!dateVal) continue;
        // Parse date
        var dateStr = '';
        if(dateVal instanceof Date){
          var y = dateVal.getFullYear();
          var m = String(dateVal.getMonth()+1).padStart(2,'0');
          dateStr = y + '-' + m;
        } else {
          dateStr = String(dateVal).substring(0,7);
        }
        if(!/^\d{4}-\d{2}$/.test(dateStr)) continue;
        var cmb = parseFloat(row[2]) || 0;
        var cmbFps = parseFloat(row[3]) || 0;
        var cmbFund = parseFloat(row[4]) || 0;
        var boc = parseFloat(row[5]) || 0;
        var szRcb = parseFloat(row[6]) || 0;
        var abc = parseFloat(row[7]) || 0;
        var hf = parseFloat(row[8]) || 0;
        var gxStock = parseFloat(row[10]) || 0;
        var gxFund = parseFloat(row[11]) || 0;
        var validStock = parseFloat(row[12]) || 0;
        var cmbCredit = parseFloat(row[14]) || 0;
        var abcCredit = parseFloat(row[15]) || 0;
        var bankTotal = cmb + cmbFps + cmbFund + boc + szRcb + abc + hf;
        var stockTotal = gxStock + gxFund + validStock;
        var creditTotal = -(Math.abs(cmbCredit) + Math.abs(abcCredit));
        if(cmbCredit < 0) creditTotal = cmbCredit + abcCredit;
        var grandTotal = bankTotal + stockTotal + creditTotal;
        imported.push({
          date:dateStr, cmb:cmb, cmbFps:cmbFps, cmbFund:cmbFund,
          boc:boc, szRcb:szRcb, abc:abc, hf:hf, bankTotal:bankTotal,
          gxStock:gxStock, gxFund:gxFund, validStock:validStock, stockTotal:stockTotal,
          cmbCredit:cmbCredit, abcCredit:abcCredit, creditTotal:creditTotal,
          grandTotal:grandTotal, change:0
        });
      }
      if(imported.length === 0){ alert('未找到有效数据行'); return; }
      imported.sort(function(a,b){ return a.date.localeCompare(b.date); });
      for(var i=0; i<imported.length; i++){
        imported[i].change = i > 0 ? imported[i].grandTotal - imported[i-1].grandTotal : 0;
      }
      if(confirm('找到 ' + imported.length + ' 条记录，是否替换当前所有数据？\n\n选择「确定」替换全部数据\n选择「取消」放弃导入')){
        saveData(imported);
        render();
        alert('导入成功！共 ' + imported.length + ' 条记录');
      }
    } catch(err){
      alert('导入失败: ' + err.message);
      console.error(err);
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel(){
  var data = getData();
  if(!data.length){ alert('没有数据可导出'); return; }
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  var headers = ['','Date','CMB','CMB FPs','CMB Fund','BoC','SZ RCB','ABC','HF','Total',
    'GX Stock','GX Fund','Valid Stock','Stock Total','CMB credit','ABC Credit','Total','Total',''];
  var rows = [[], headers];
  for(var i=0; i<data.length; i++){
    var r = data[i];
    rows.push([
      '', r.date, r.cmb, r.cmbFps, r.cmbFund, r.boc, r.szRcb, r.abc, r.hf, r.bankTotal,
      r.gxStock, r.gxFund, r.validStock, r.stockTotal, r.cmbCredit, r.abcCredit, r.creditTotal, r.grandTotal, r.change
    ]);
  }
  var ws = XLSX.utils.aoa_to_sheet(rows);
  // Set column widths
  ws['!cols'] = [{wch:3},{wch:12},{wch:14},{wch:14},{wch:14},{wch:10},{wch:10},{wch:14},{wch:10},{wch:14},
    {wch:12},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Fay');
  XLSX.writeFile(wb, 'Balance_Sheet_Fay_' + new Date().toISOString().slice(0,10) + '.xlsx');
}
