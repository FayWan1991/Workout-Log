<!DOCTYPE html>

<style>
:root {
  --bg: #FFF6F0;
  --card: #FFFFFF;
  --pink: #FF6B9D;
  --purple: #C471ED;
  --blue: #69B4FF;
  --mint: #5CDEC0;
  --yellow: #FFD93D;
  --orange: #FF9A56;
  --coral: #FF7675;
  --text: #2D3436;
  --text-light: #A0A0A0;
  --gradient1: linear-gradient(135deg, #FF6B9D 0%, #C471ED 100%);
  --gradient2: linear-gradient(135deg, #69B4FF 0%, #5CDEC0 100%);
  --gradient3: linear-gradient(135deg, #FFD93D 0%, #FF9A56 100%);
  --shadow: 0 4px 20px rgba(255,107,157,0.12);
  --shadow2: 0 8px 32px rgba(196,113,237,0.15);
  --radius: 20px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -120px;
  right: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px;
  left: -60px;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(105,180,255,0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
#app { position: relative; z-index: 1; }

.header {
  text-align: center;
  padding: 44px 20px 28px;
}
.header-emoji { font-size: 2.8rem; margin-bottom: 8px; }
.header h1 {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1.7rem;
  background: var(--gradient1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  font-size: 0.82rem;
  color: var(--text-light);
  margin-top: 4px;
  font-weight: 400;
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 16px 110px;
}

/* Summary Cards */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.summary-card {
  border-radius: var(--radius);
  padding: 18px 12px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow2);
  transition: transform 0.3s;
}
.summary-card:nth-child(1) { background: var(--gradient1); }
.summary-card:nth-child(2) { background: var(--gradient3); }
.summary-card:nth-child(3) { background: var(--gradient2); }
.summary-card:active { transform: scale(0.95); }
.summary-card::after {
  content: '';
  position: absolute;
  top: -20px;
  right: -20px;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
}
.summary-card .card-emoji { font-size: 1.5rem; margin-bottom: 4px; }
.summary-card .label {
  font-size: 0.65rem;
  opacity: 0.85;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  font-weight: 500;
}
.summary-card .value {
  font-family: 'Quicksand', sans-serif;
  font-size: 1.7rem;
  font-weight: 700;
}
.summary-card .unit {
  font-size: 0.6rem;
  opacity: 0.8;
}
.summary-card .trend {
  font-size: 0.72rem;
  margin-top: 4px;
  font-weight: 600;
  background: rgba(255,255,255,0.25);
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
}

/* Chart */
.chart-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 16px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,107,157,0.08);
}
.chart-section h2 {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 16px;
  text-align: center;
}
.chart-section h2 span { margin-right: 6px; }
.chart-tabs {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.chart-tab {
  padding: 5px 14px;
  border-radius: 20px;
  border: 2px solid #F0E6FF;
  background: #FAFAFA;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 500;
}
.chart-tab.active {
  background: var(--gradient1);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(255,107,157,0.3);
}
.chart-container { position: relative; height: 200px; }

/* Section */
.section-header {
  text-align: center;
  margin-bottom: 16px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
}
.section-header span { margin-right: 6px; }

/* Record Cards */
.record-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.record-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 20px 20px 0 0;
}
.record-card:nth-child(odd)::before { background: var(--gradient1); }
.record-card:nth-child(even)::before { background: var(--gradient2); }
.record-card:active { transform: scale(0.98); }

.record-date {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--purple);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.record-body-type {
  font-size: 0.68rem;
  padding: 3px 10px;
  border-radius: 10px;
  background: linear-gradient(135deg, #FFE0EC, #F0E6FF);
  color: var(--purple);
  font-weight: 600;
}
.record-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.record-item {
  background: #FFF9F5;
  border-radius: 12px;
  padding: 8px;
  text-align: center;
}
.record-item .rlabel {
  font-size: 0.58rem;
  color: var(--text-light);
  font-weight: 500;
}
.record-item .rvalue {
  font-family: 'Quicksand', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  margin-top: 2px;
  color: var(--text);
}
.record-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  justify-content: flex-end;
}
.btn-sm {
  padding: 5px 16px;
  border-radius: 20px;
  border: 2px solid #F0E6FF;
  background: transparent;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem;
  color: var(--purple);
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}
.btn-sm:hover { background: #F0E6FF; }
.btn-sm.delete { border-color: #FFE0E0; color: var(--coral); }
.btn-sm.delete:hover { background: #FFE0E0; }

/* FAB */
.fab {
  position: fixed;
  bottom: 32px;
  right: 24px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--gradient1);
  color: #fff;
  border: none;
  font-size: 1.8rem;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,107,157,0.45);
  transition: transform 0.3s, box-shadow 0.3s;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 32px rgba(255,107,157,0.55); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(45,52,54,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 28px 28px 0 0;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px 20px 36px;
  animation: slideUp 0.35s cubic-bezier(.22,.68,0,1.1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h2 {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1.15rem;
  text-align: center;
  margin-bottom: 22px;
  color: var(--text);
}
.modal h2 span { margin-right: 6px; }
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-group {
  display: flex;
  flex-direction: column;
}
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 0.7rem;
  color: var(--text-light);
  margin-bottom: 4px;
  font-weight: 500;
}
.form-group input, .form-group select {
  padding: 11px 14px;
  border: 2px solid #F0E6FF;
  border-radius: 14px;
  font-family: 'Quicksand', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  background: #FAFAFE;
  color: var(--text);
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  -webkit-appearance: none;
}
.form-group input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,107,157,0.12);
}
.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}
.btn {
  flex: 1;
  padding: 13px;
  border-radius: 14px;
  border: none;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: var(--gradient1);
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,157,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(255,107,157,0.45); transform: translateY(-1px); }
.btn-secondary {
  background: #F5F0FF;
  border: 2px solid #E8DFFF;
  color: var(--purple);
}
.btn-secondary:hover { background: #EDE5FF; }

/* Empty */
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.85rem; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--gradient1);
  padding: 10px 24px;
  border-radius: 14px;
  font-size: 0.8rem;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 6px 24px rgba(255,107,157,0.35);
  z-index: 300;
  transition: transform 0.4s cubic-bezier(.22,.68,0,1.1);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .header-emoji { font-size: 2.2rem; }
  .header h1 { font-size: 1.4rem; }
  .summary { gap: 8px; }
  .summary-card { padding: 14px 8px; }
  .summary-card .value { font-size: 1.4rem; }
  .summary-card .card-emoji { font-size: 1.2rem; }
  .record-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .fab { bottom: 24px; right: 18px; width: 52px; height: 52px; font-size: 1.5rem; }
}
.toolbar {
  display: flex; justify-content: center; gap: 10px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 14px;
  border: 2px solid #F0E6FF; background: var(--card);
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.72rem;
  color: var(--purple); cursor: pointer; font-weight: 600;
  transition: all 0.3s; box-shadow: var(--shadow);
}
.toolbar-btn:hover { border-color: var(--purple); background: #F5F0FF; }
.toolbar-btn:active { transform: scale(0.95); }
</style>
<script>
const INITIAL_DATA = [
  { date:'2026-01-31', weight:56.6, muscle:21.2, fat:17.3, bmi:20.8, fatRate:30.6, visceral:7, bmr:1218.9, type:'消瘦型' },
  { date:'2026-02-23', weight:55.8, muscle:21.1, fat:16.6, bmi:20.5, fatRate:29.8, visceral:6, bmr:1216.7, type:'消瘦型' },
  { date:'2026-05-20', weight:55.4, muscle:22.0, fat:14.8, bmi:20.5, fatRate:26.8, visceral:5, bmr:1247, type:'' }
];

const FIELDS = [
  { key:'weight', label:'体重', unit:'kg', emoji:'⚖️' },
  { key:'muscle', label:'骨骼肌', unit:'kg', emoji:'💪' },
  { key:'fat', label:'体脂肪', unit:'kg', emoji:'🧈' },
  { key:'bmi', label:'BMI', unit:'kg/m²', emoji:'📊' },
  { key:'fatRate', label:'体脂率', unit:'%', emoji:'📉' },
  { key:'visceral', label:'内脏脂肪', unit:'级', emoji:'🫀' },
  { key:'bmr', label:'基础代谢', unit:'kcal', emoji:'🔥' }
];

const CHART_COLORS = {
  weight: { border:'#FF6B9D', bg:'rgba(255,107,157,0.1)' },
  muscle: { border:'#5CDEC0', bg:'rgba(92,222,192,0.1)' },
  fat:    { border:'#FFD93D', bg:'rgba(255,217,61,0.1)' },
  bmi:    { border:'#C471ED', bg:'rgba(196,113,237,0.1)' },
  fatRate:{ border:'#FF9A56', bg:'rgba(255,154,86,0.1)' },
  visceral:{ border:'#69B4FF', bg:'rgba(105,180,255,0.1)' },
  bmr:   { border:'#FF7675', bg:'rgba(255,118,117,0.1)' }
};

/* ========== Firebase 配置 ========== */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCw2LvvJP4ySN7exYJ5tVCbN8fwcOA7KSM",
  authDomain: "tools-61215.firebaseapp.com",
  databaseURL: "https://tools-61215-default-rtdb.firebaseio.com",
  projectId: "tools-61215",
  storageBucket: "tools-61215.firebasestorage.app",
  messagingSenderId: "417996402549",
  appId: "1:417996402549:web:3246d8bef7a67be39fed3c"
};

var firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.database();
var dbRef = db.ref('workout_records');
var cachedData = null;
var firebaseReady = false;

function getData() {
  if(cachedData) return cachedData.slice();
  try {
    var s = localStorage.getItem('corps_body_data_v2');
    if(s) return JSON.parse(s);
  } catch(e){}
  return INITIAL_DATA.slice();
}

function saveData(data) {
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  cachedData = data.slice();
  try { localStorage.setItem('corps_body_data_v2', JSON.stringify(data)); } catch(e){}
  dbRef.set(data).catch(function(err){ console.warn('Firebase write error:', err); });
}

// Real-time sync from Firebase
dbRef.on('value', function(snapshot){
  var val = snapshot.val();
  if(val && Array.isArray(val)){
    cachedData = val;
    try { localStorage.setItem('corps_body_data_v2', JSON.stringify(val)); } catch(e){}
    firebaseReady = true;
    render();
  } else if(!firebaseReady){
    firebaseReady = true;
    var localData = getData();
    dbRef.set(localData);
    cachedData = localData;
    render();
  }
});

let chart = null;
let currentChart = 'weight';
let editIndex = -1;

function formatDate(d) {
  const p = d.split('-');
  return p[0] + '.' + p[1] + '.' + p[2];
}
function shortDate(d) {
  const p = d.split('-');
  return p[1] + '/' + p[2];
}

function trendText(curr, prev, inverse) {
  if (prev == null) return '';
  const diff = curr - prev;
  if (Math.abs(diff) < 0.01) return '<span class="trend">—</span>';
  const good = inverse ? diff < 0 : diff > 0;
  const arrow = diff > 0 ? '↑' : '↓';
  const emoji = good ? '✨' : '';
  return '<span class="trend">' + arrow + ' ' + Math.abs(diff).toFixed(1) + ' ' + emoji + '</span>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function renderSummary(data) {
  if (data.length === 0) return '';
  const last = data[data.length - 1];
  const prev = data.length > 1 ? data[data.length - 2] : null;
  const cards = [
    { label:'体重', value:last.weight, unit:'kg', key:'weight', inverse:true, emoji:'⚖️' },
    { label:'体脂率', value:last.fatRate, unit:'%', key:'fatRate', inverse:true, emoji:'📉' },
    { label:'骨骼肌', value:last.muscle, unit:'kg', key:'muscle', inverse:false, emoji:'💪' }
  ];
  var html = '<div class="summary">';
  cards.forEach(function(c) {
    var p = prev ? prev[c.key] : null;
    html += '<div class="summary-card">'
      + '<div class="card-emoji">' + c.emoji + '</div>'
      + '<div class="label">' + c.label + '</div>'
      + '<div class="value">' + c.value + '</div>'
      + '<div class="unit">' + c.unit + '</div>'
      + trendText(c.value, p, c.inverse)
      + '</div>';
  });
  html += '</div>';
  return html;
}

function renderChart() {
  if (typeof Chart === 'undefined') return;
  try {
  var data = getData();
  if (data.length < 1) return;
  var labels = data.map(function(d){ return shortDate(d.date); });
  var values = data.map(function(d){ return d[currentChart]; });
  var field = FIELDS.find(function(f){ return f.key === currentChart; });
  var cc = CHART_COLORS[currentChart];

  if (chart) chart.destroy();
  var el = document.getElementById('mainChart');
  if (!el) return;
  var ctx = el.getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: field.label,
        data: values,
        borderColor: cc.border,
        backgroundColor: cc.bg,
        borderWidth: 3,
        pointBackgroundColor: '#fff',
        pointBorderColor: cc.border,
        pointBorderWidth: 3,
        pointRadius: 6,
        pointHoverRadius: 9,
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#2D3436',
          bodyColor: '#2D3436',
          borderColor: '#F0E6FF',
          borderWidth: 2,
          padding: 12,
          cornerRadius: 12,
          titleFont: { family:'Quicksand', size:12, weight:'600' },
          bodyFont: { family:'Quicksand', size:14, weight:'700' },
          callbacks: {
            label: function(c){ return c.parsed.y + ' ' + field.unit; }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font:{ family:'Quicksand', size:11, weight:'500' }, color:'#A0A0A0' }
        },
        y: {
          grid: { color:'#FFF0F5', lineWidth: 1 },
          ticks: { font:{ family:'Quicksand', size:11, weight:'500' }, color:'#A0A0A0' }
        }
      }
    }
  });
  } catch(e) { console.warn('Chart render failed:', e); }
}

function renderRecords(data) {
  if (data.length === 0) {
    return '<div class="empty-state"><div class="icon">🌸</div><p>还没有记录哦～点击下方按钮开始吧</p></div>';
  }
  var html = '';
  var reversed = data.slice().reverse();
  reversed.forEach(function(r, ri) {
    var idx = data.length - 1 - ri;
    html += '<div class="record-card">'
      + '<div class="record-date">'
      + '<span>📅 ' + formatDate(r.date) + '</span>'
      + (r.type ? '<span class="record-body-type">' + r.type + '</span>' : '')
      + '</div>'
      + '<div class="record-grid">'
      + '<div class="record-item"><div class="rlabel">⚖️ 体重</div><div class="rvalue">' + r.weight + '</div></div>'
      + '<div class="record-item"><div class="rlabel">💪 骨骼肌</div><div class="rvalue">' + r.muscle + '</div></div>'
      + '<div class="record-item"><div class="rlabel">🧈 体脂肪</div><div class="rvalue">' + r.fat + '</div></div>'
      + '<div class="record-item"><div class="rlabel">📊 BMI</div><div class="rvalue">' + r.bmi + '</div></div>'
      + '<div class="record-item"><div class="rlabel">📉 体脂率</div><div class="rvalue">' + r.fatRate + '%</div></div>'
      + '<div class="record-item"><div class="rlabel">🫀 内脏脂肪</div><div class="rvalue">' + r.visceral + '</div></div>'
      + '<div class="record-item"><div class="rlabel">🔥 基础代谢</div><div class="rvalue">' + r.bmr + '</div></div>'
      + '</div>'
      + '<div class="record-actions">'
      + '<button class="btn-sm" onclick="openEdit(' + idx + ')">✏️ 编辑</button>'
      + '<button class="btn-sm delete" onclick="deleteRecord(' + idx + ')">🗑️ 删除</button>'
      + '</div>'
      + '</div>';
  });
  return html;
}

function render() {
  var data = getData();
  var app = document.getElementById('app');
  var chartTabs = FIELDS.map(function(f) {
    return '<button class="chart-tab ' + (currentChart===f.key?'active':'') + '" onclick="switchChart(\'' + f.key + '\')">' + f.emoji + ' ' + f.label + '</button>';
  }).join('');

  app.innerHTML = ''
    + '<div class="header">'
    + '  <div class="header-emoji">🌟</div>'
    + '  <h1>My Body Log</h1>'
    + '  <p>记录每一次变化 · 遇见更好的自己</p>'
    + '</div>'
    + '<div class="container">'
    + renderSummary(data)
    + '<div class="toolbar"><button class="toolbar-btn" onclick="document.getElementById(\'importFile\').click()">📥 导入 Excel</button><button class="toolbar-btn" onclick="exportExcel()">📤 导出 Excel</button></div>'
    + '<div class="chart-section">'
    + '  <h2><span>📈</span>趋势变化</h2>'
    + '  <div class="chart-tabs">' + chartTabs + '</div>'
    + '  <div class="chart-container"><canvas id="mainChart"></canvas></div>'
    + '</div>'
    + '<div class="section-header"><span>📋</span>历史记录</div>'
    + renderRecords(data)
    + '</div>'
    + '<button class="fab" onclick="openAdd()">+</button>'
    + '<input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(event)">'
    + '<div class="modal-overlay" id="modal">'
    + '  <div class="modal">'
    + '    <h2 id="modalTitle"><span>✨</span>添加记录</h2>'
    + '    <div class="form-grid">'
    + '      <div class="form-group full"><label>📅 日期</label><input type="date" id="f_date"></div>'
    + '      <div class="form-group"><label>⚖️ 体重 (kg)</label><input type="number" step="0.1" id="f_weight"></div>'
    + '      <div class="form-group"><label>💪 骨骼肌量 (kg)</label><input type="number" step="0.1" id="f_muscle"></div>'
    + '      <div class="form-group"><label>🧈 体脂肪量 (kg)</label><input type="number" step="0.1" id="f_fat"></div>'
    + '      <div class="form-group"><label>📊 BMI (kg/m²)</label><input type="number" step="0.1" id="f_bmi"></div>'
    + '      <div class="form-group"><label>📉 体脂率 (%)</label><input type="number" step="0.1" id="f_fatRate"></div>'
    + '      <div class="form-group"><label>🫀 内脏脂肪等级</label><input type="number" step="1" id="f_visceral"></div>'
    + '      <div class="form-group"><label>🔥 基础代谢 (kcal)</label><input type="number" step="0.1" id="f_bmr"></div>'
    + '      <div class="form-group"><label>🏷️ 体型坐标</label><input type="text" id="f_type" placeholder="如：消瘦型、标准型"></div>'
    + '    </div>'
    + '    <div class="form-actions">'
    + '      <button class="btn btn-secondary" onclick="closeModal()">取消</button>'
    + '      <button class="btn btn-primary" onclick="saveRecord()">保存 ✨</button>'
    + '    </div>'
    + '  </div>'
    + '</div>'
    + '<div class="toast" id="toast"></div>';

  renderChart();
}

function switchChart(key) {
  currentChart = key;
  render();
}

function openAdd() {
  editIndex = -1;
  render();
  document.getElementById('modalTitle').innerHTML = '<span>✨</span>添加记录';
  document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal').classList.add('open');
}

function openEdit(idx) {
  editIndex = idx;
  var data = getData();
  var r = data[idx];
  render();
  document.getElementById('modalTitle').innerHTML = '<span>✏️</span>编辑记录';
  document.getElementById('f_date').value = r.date;
  document.getElementById('f_weight').value = r.weight;
  document.getElementById('f_muscle').value = r.muscle;
  document.getElementById('f_fat').value = r.fat;
  document.getElementById('f_bmi').value = r.bmi;
  document.getElementById('f_fatRate').value = r.fatRate;
  document.getElementById('f_visceral').value = r.visceral;
  document.getElementById('f_bmr').value = r.bmr;
  document.getElementById('f_type').value = r.type || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editIndex = -1;
}

function saveRecord() {
  var r = {
    date: document.getElementById('f_date').value,
    weight: parseFloat(document.getElementById('f_weight').value) || 0,
    muscle: parseFloat(document.getElementById('f_muscle').value) || 0,
    fat: parseFloat(document.getElementById('f_fat').value) || 0,
    bmi: parseFloat(document.getElementById('f_bmi').value) || 0,
    fatRate: parseFloat(document.getElementById('f_fatRate').value) || 0,
    visceral: parseInt(document.getElementById('f_visceral').value) || 0,
    bmr: parseFloat(document.getElementById('f_bmr').value) || 0,
    type: document.getElementById('f_type').value.trim()
  };
  if (!r.date) { showToast('请先选择日期哦～'); return; }
  var data = getData();
  if (editIndex >= 0) {
    data[editIndex] = r;
    showToast('已更新 ✨');
  } else {
    data.push(r);
    showToast('已添加 🎉');
  }
  saveData(data);
  closeModal();
  render();
}

function deleteRecord(idx) {
  if (!confirm('确认删除这条记录吗？')) return;
  var data = getData();
  data.splice(idx, 1);
  saveData(data);
  showToast('已删除 🗑️');
  render();
}

function handleImport(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      var imported = [];
      for(var r=1; r<rows.length; r++){
        var row = rows[r];
        var dateVal = row[0];
        if(!dateVal) continue;
        var dateStr = '';
        if(dateVal instanceof Date){
          dateStr = dateVal.toISOString().split('T')[0];
        } else {
          dateStr = String(dateVal).substring(0,10);
        }
        if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) continue;
        imported.push({
          date: dateStr,
          weight: parseFloat(row[1])||0,
          muscle: parseFloat(row[2])||0,
          fat: parseFloat(row[3])||0,
          bmi: parseFloat(row[4])||0,
          fatRate: parseFloat(row[5])||0,
          visceral: parseInt(row[6])||0,
          bmr: parseFloat(row[7])||0,
          type: String(row[8]||'').trim()
        });
      }
      if(!imported.length){ alert('未找到有效数据'); return; }
      imported.sort(function(a,b){ return a.date.localeCompare(b.date); });
      if(confirm('找到 '+imported.length+' 条记录，替换当前所有数据？')){
        saveData(imported);
        showToast('导入成功 '+imported.length+' 条');
        render();
      }
    } catch(err){ alert('导入失败: '+err.message); }
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel(){
  var data=getData();
  if(!data.length){ alert('没有数据'); return; }
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  var headers=['日期','体重(kg)','骨骼肌(kg)','体脂肪(kg)','BMI','体脂率(%)','内脏脂肪(级)','基础代谢(kcal)','体型'];
  var rows=[headers];
  data.forEach(function(r){
    rows.push([r.date,r.weight,r.muscle,r.fat,r.bmi,r.fatRate,r.visceral,r.bmr,r.type||'']);
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:10},{wch:12},{wch:12},{wch:8},{wch:10},{wch:14},{wch:14},{wch:10}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Body Log');
  XLSX.writeFile(wb,'Body_Log_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

document.addEventListener('click', function(e) {
  var modal = document.getElementById('modal');
  if (e.target === modal) closeModal();
});
</script>
</head>
<body>
<div id="app"></div>
<script>
document.addEventListener('DOMContentLoaded', function() { render(); });
if (document.readyState !== 'loading') render();
</script>
