<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #F0F4F3;
  --card: #FFFFFF;
  --emerald: #2D9F7F;
  --emerald-dark: #1A7A5E;
  --gold: #E8A838;
  --gold-light: #FFF3DC;
  --coral: #EF6B6B;
  --blue: #5B8DEF;
  --purple: #9B72CF;
  --text: #1E2D2B;
  --text-light: #7A8E8B;
  --border: #D6E4E0;
  --gradient-g: linear-gradient(135deg, #2D9F7F 0%, #45C4A0 100%);
  --gradient-gold: linear-gradient(135deg, #E8A838 0%, #F4C76B 100%);
  --gradient-coral: linear-gradient(135deg, #EF6B6B 0%, #F09090 100%);
  --gradient-blue: linear-gradient(135deg, #5B8DEF 0%, #82AEFC 100%);
  --shadow: 0 4px 20px rgba(45,159,127,0.1);
  --shadow2: 0 8px 32px rgba(45,159,127,0.14);
  --radius: 20px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: -100px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(45,159,127,0.1) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; bottom: -80px; left: -40px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(232,168,56,0.08) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; }
.header {
  text-align: center; padding: 40px 20px 24px;
}
.header-emoji { font-size: 2.6rem; margin-bottom: 6px; }
.header h1 {
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.6rem;
  background: var(--gradient-g);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header p { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }
.container { max-width: 720px; margin: 0 auto; padding: 0 16px 110px; }

/* Balance Hero */
.balance-hero {
  background: var(--gradient-g); border-radius: var(--radius);
  padding: 28px 24px; text-align: center; color: #fff;
  margin-bottom: 16px; box-shadow: var(--shadow2);
  position: relative; overflow: hidden;
}
.balance-hero::after {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: rgba(255,255,255,0.1); border-radius: 50%;
}
.balance-hero::before {
  content: ''; position: absolute; bottom: -20px; left: -20px;
  width: 70px; height: 70px;
  background: rgba(255,255,255,0.08); border-radius: 50%;
}
.balance-hero .bl { font-size: 0.75rem; opacity: 0.85; margin-bottom: 4px; }
.balance-hero .bv {
  font-family: 'Quicksand', sans-serif; font-size: 2.4rem; font-weight: 700;
}
.balance-hero .bu { font-size: 0.7rem; opacity: 0.7; margin-top: 2px; }

/* Summary row */
.summary-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
}
.summary-card {
  border-radius: var(--radius); padding: 18px 14px;
  text-align: center; color: #fff;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow); transition: transform 0.3s;
}
.summary-card:active { transform: scale(0.96); }
.summary-card::after {
  content: ''; position: absolute; top: -15px; right: -15px;
  width: 50px; height: 50px;
  background: rgba(255,255,255,0.15); border-radius: 50%;
}
.summary-card.income { background: var(--gradient-gold); }
.summary-card.expense { background: var(--gradient-coral); }
.summary-card .sc-emoji { font-size: 1.3rem; margin-bottom: 4px; }
.summary-card .sc-label { font-size: 0.65rem; opacity: 0.9; }
.summary-card .sc-value { font-family: 'Quicksand', sans-serif; font-size: 1.5rem; font-weight: 700; }

/* Chart */
.chart-section {
  background: var(--card); border-radius: var(--radius);
  padding: 22px 16px; margin-bottom: 20px;
  box-shadow: var(--shadow); border: 2px solid rgba(45,159,127,0.06);
}
.chart-section h2 {
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.95rem;
  color: var(--text); margin-bottom: 14px; text-align: center;
}
.chart-tabs {
  display: flex; justify-content: center; gap: 6px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.chart-tab {
  padding: 5px 14px; border-radius: 18px;
  border: 2px solid var(--border); background: #FAFAFA;
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.7rem;
  color: var(--text-light); cursor: pointer;
  transition: all 0.3s; font-weight: 500;
}
.chart-tab.active {
  background: var(--gradient-g); color: #fff;
  border-color: transparent; box-shadow: 0 3px 12px rgba(45,159,127,0.25);
}
.chart-container { position: relative; height: 200px; }

/* Section */
.section-header {
  text-align: center; margin-bottom: 14px;
  font-family: 'Quicksand', sans-serif; font-weight: 700;
  font-size: 0.95rem; color: var(--text);
}

/* Record cards */
.record-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 2px solid transparent;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.record-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: 20px 20px 0 0;
}
.record-card.pos::before { background: var(--gradient-g); }
.record-card.neg::before { background: var(--gradient-coral); }
.record-card:active { transform: scale(0.98); }
.record-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.record-date {
  font-family: 'Quicksand', sans-serif; font-size: 0.8rem;
  font-weight: 600; color: var(--emerald);
}
.record-balance {
  font-family: 'Quicksand', sans-serif; font-size: 0.78rem;
  font-weight: 700; padding: 3px 10px; border-radius: 10px;
  background: rgba(45,159,127,0.08); color: var(--emerald);
}
.record-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.record-item {
  background: #F5F9F8; border-radius: 12px;
  padding: 8px; text-align: center;
}
.record-item.inc-item { background: var(--gold-light); }
.record-item.exp-item { background: #FFF0F0; }
.record-item .rl { font-size: 0.55rem; color: var(--text-light); font-weight: 500; }
.record-item .rv {
  font-family: 'Quicksand', sans-serif; font-size: 1rem;
  font-weight: 700; margin-top: 1px; color: var(--text);
}
.record-item.inc-item .rv { color: var(--gold); }
.record-item.exp-item .rv { color: var(--coral); }
.record-detail-toggle {
  text-align: center; margin-top: 10px;
}
.record-detail-toggle button {
  background: none; border: none; color: var(--text-light);
  font-size: 0.68rem; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
}
.record-detail {
  display: none; margin-top: 10px;
  grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.record-detail.open { display: grid; }
.record-detail .rd-item {
  font-size: 0.6rem; padding: 5px 6px;
  background: #F8FAFA; border-radius: 8px; text-align: center;
}
.record-detail .rd-item .rdl { color: var(--text-light); }
.record-detail .rd-item .rdv {
  font-family: 'Quicksand', sans-serif; font-weight: 600;
  font-size: 0.78rem; margin-top: 1px;
}
.record-actions {
  display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
}
.btn-sm {
  padding: 4px 14px; border-radius: 18px;
  border: 2px solid var(--border); background: transparent;
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.68rem;
  color: var(--emerald); cursor: pointer; transition: all 0.2s; font-weight: 600;
}
.btn-sm:hover { background: rgba(45,159,127,0.06); }
.btn-sm.delete { border-color: #FFE0E0; color: var(--coral); }
.btn-sm.delete:hover { background: #FFF0F0; }

/* FAB */
.fab {
  position: fixed; bottom: 32px; right: 24px;
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--gradient-g); color: #fff; border: none;
  font-size: 1.8rem; cursor: pointer;
  box-shadow: 0 6px 24px rgba(45,159,127,0.4);
  transition: transform 0.3s, box-shadow 0.3s;
  z-index: 100; display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 32px rgba(45,159,127,0.5); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,45,43,0.35);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 26px 26px 0 0;
  width: 100%; max-width: 720px; max-height: 92vh;
  overflow-y: auto; padding: 26px 20px 36px;
  animation: slideUp 0.35s cubic-bezier(.22,.68,0,1.1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 {
  font-family: 'Quicksand', sans-serif; font-weight: 700;
  font-size: 1.1rem; text-align: center; margin-bottom: 20px; color: var(--text);
}
.form-section-title {
  font-size: 0.72rem; font-weight: 700; color: var(--emerald);
  margin: 16px 0 8px; padding-left: 4px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 0.68rem; color: var(--text-light); margin-bottom: 3px; font-weight: 500;
}
.form-group input {
  padding: 10px 12px; border: 2px solid var(--border); border-radius: 12px;
  font-family: 'Quicksand', sans-serif; font-size: 0.92rem; font-weight: 600;
  background: #FAFCFB; color: var(--text); outline: none;
  transition: border-color 0.3s, box-shadow 0.3s; -webkit-appearance: none;
}
.form-group input:focus {
  border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(45,159,127,0.1);
}
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1; padding: 12px; border-radius: 14px; border: none;
  font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem;
  font-weight: 700; cursor: pointer; transition: all 0.3s;
}
.btn-primary {
  background: var(--gradient-g); color: #fff;
  box-shadow: 0 4px 16px rgba(45,159,127,0.25);
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(45,159,127,0.4); transform: translateY(-1px); }
.btn-secondary { background: #F0F4F3; border: 2px solid var(--border); color: var(--text-light); }

.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--gradient-g); padding: 10px 24px;
  border-radius: 14px; font-size: 0.8rem; color: #fff; font-weight: 600;
  box-shadow: 0 6px 24px rgba(45,159,127,0.3);
  z-index: 300; transition: transform 0.4s cubic-bezier(.22,.68,0,1.1);
}
.toast.show { transform: translateX(-50%) translateY(0); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

@media (max-width: 480px) {
  .header-emoji { font-size: 2.2rem; }
  .header h1 { font-size: 1.3rem; }
  .balance-hero .bv { font-size: 1.9rem; }
  .summary-card .sc-value { font-size: 1.2rem; }
  .record-grid { grid-template-columns: repeat(2, 1fr); }
  .record-detail { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .fab { bottom: 24px; right: 18px; width: 52px; height: 52px; font-size: 1.5rem; }
}
</style>

function getData(){
  if(cachedData) return cachedData.slice();
  // fallback to localStorage
  try {
    var s = localStorage.getItem('lf_balance_v1');
    if(s) return JSON.parse(s);
  } catch(e){}
  return INITIAL.slice();
}

function saveData(data){
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  cachedData = data.slice();
  // save to localStorage as offline backup
  try { localStorage.setItem('lf_balance_v1', JSON.stringify(data)); } catch(e){}
  // save to Firebase
  dbRef.set(data).catch(function(err){ console.warn('Firebase write error:', err); });
}

// Real-time sync from Firebase
dbRef.on('value', function(snapshot){
  var val = snapshot.val();
  if(val && Array.isArray(val)){
    cachedData = val;
    try { localStorage.setItem('lf_balance_v1', JSON.stringify(val)); } catch(e){}
    firebaseReady = true;
    render();
  } else if(!firebaseReady){
    // First time: upload initial/local data to Firebase
    firebaseReady = true;
    var localData = getData();
    dbRef.set(localData);
    cachedData = localData;
    render();
  }
});

function fmt(n){
  if(n==null||n===0) return '-';
  var abs = Math.abs(n);
  if(abs>=10000) return (n<0?'-':'') + (abs/10000).toFixed(abs%10000===0?0:1) + 'w';
  return n.toLocaleString();
}
function fmtFull(n){
  if(n==null||n===0) return '-';
  return n.toLocaleString();
}

function showToast(msg){

function gv(id){ return parseFloat(document.getElementById(id).value)||0; }
function sv(id,v){ var el=document.getElementById(id); if(el&&v) el.value=v; }

function openAdd(){
  editIndex=-1; render();
  document.getElementById('modalTitle').innerHTML='✨ 添加记录';
  var now=new Date(); sv('f_date',now.getFullYear()+'-'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1));
  document.getElementById('modal').classList.add('open');
}

function openEdit(idx){
  editIndex=idx; var r=getData()[idx]; render();
  document.getElementById('modalTitle').innerHTML='✏️ 编辑记录';
  sv('f_date',r.date); sv('f_inc1',r.inc1||''); sv('f_inc2',r.inc2||'');
  sv('f_mortgage',r.mortgage?Math.abs(r.mortgage):'');
  sv('f_creditCard',r.creditCard?Math.abs(r.creditCard):'');
  sv('f_bankCard',r.bankCard?Math.abs(r.bankCard):'');
  sv('f_water',r.water||''); sv('f_electric',r.electric||''); sv('f_gas',r.gas||'');
  sv('f_internet',r.internet||''); sv('f_car',r.car||''); sv('f_property',r.property||'');
  sv('f_medical',r.medical||''); sv('f_parents',r.parents||''); sv('f_children',r.children||'');
  sv('f_wechat',r.wechat||'');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); editIndex=-1; }

function saveRecord(){
  var date=document.getElementById('f_date').value;
  if(!date){ showToast('请选择月份'); return; }
  var inc1=gv('f_inc1'), inc2=gv('f_inc2');
  var mortgage=gv('f_mortgage'), creditCard=gv('f_creditCard'), bankCard=gv('f_bankCard');
  var water=gv('f_water'), electric=gv('f_electric'), gas=gv('f_gas');
  var internet=gv('f_internet'), car=gv('f_car'), property=gv('f_property');
  var medical=gv('f_medical'), parents=gv('f_parents'), children=gv('f_children'), wechat=gv('f_wechat');
  var incTTL=inc1+inc2;
  var expTTL=-(mortgage+creditCard+bankCard);

  var data=getData();
  // calc balance from previous
  var r={date:date,inc1:inc1,inc2:inc2,incTTL:incTTL,
    mortgage:-mortgage,creditCard:-creditCard,bankCard:-bankCard,
    water:water,electric:electric,gas:gas,internet:internet,car:car,
    property:property,bankCard2:0,medical:medical,parents:parents,children:children,wechat:wechat,
    expTTL:expTTL,balance:0};

  if(editIndex>=0){ data[editIndex]=r; } else { data.push(r); }
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });
  // recalc balances
  for(var i=0;i<data.length;i++){
    var prev=i>0?data[i-1].balance:0;
    data[i].balance=prev+data[i].incTTL+data[i].expTTL;
  }
  saveData(data);
  closeModal();
  showToast(editIndex>=0?'已更新 ✨':'已添加 🎉');
  render();
}

function deleteRecord(idx){
  if(!confirm('确认删除这条记录吗？')) return;
  var data=getData(); data.splice(idx,1);
  // recalc
  for(var i=0;i<data.length;i++){
    var prev=i>0?data[i-1].balance:0;
    data[i].balance=prev+data[i].incTTL+data[i].expTTL;
  }
  saveData(data); showToast('已删除 🗑️'); render();
}

document.addEventListener('click',function(e){
  if(e.target===document.getElementById('modal')) closeModal();
});

render();
